<VirtualHost *:80>
	ServerName lfs.isw811.xyz
	ServerAlias www.lfs.isw811.xyz

	ServerAdmin webmaster@localhost
	DocumentRoot /vagrant/sites/lfs.isw811.xyz/public
	DirectoryIndex index.php index.html

	<Directory /vagrant/sites/lfs.isw811.xyz/public>
		Options FollowSymLinks
		AllowOverride All
		Require all granted
	</Directory>

	ErrorLog ${APACHE_LOG_DIR}/lfs.isw811.xyz_error.log
	CustomLog ${APACHE_LOG_DIR}/lfs.isw811.xyz_access.log combined
</VirtualHost>
